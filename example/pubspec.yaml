name: flutter_example
description: "Full-project example demonstrating bm_flutter and bm_flutter_networking packages"
publish_to: 'none'

version: 1.0.0+4

environment:
  sdk: '>=3.4.8 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.9
  envied: ^1.3.4
  rename_app: 1.6.5
  app_settings: 7.0.0
  flutter_launcher_icons: 0.14.4
  bloc: 9.2.0
  flutter_bloc: 9.1.1
  freezed: 3.2.5
  freezed_annotation: 3.1.0
  auto_route: 11.1.0
  get_it: 9.2.1
  injectable: 2.7.1+4
  hive_flutter: ^1.1.0
  bm_flutter: ^0.1.5
  bm_flutter_networking: ^0.1.11
  flutter_svg: ^2.2.4
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  geocoding: ^4.0.0
  url_launcher: ^6.3.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  uuid: ^4.5.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 6.0.0
  build_runner: ^2.13.1
  injectable_generator: ^2.12.1
  auto_route_generator: 10.4.0
  envied_generator: ^1.3.4
  bloc_test: 10.0.0
  mocktail: 1.0.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/tabbar/
    - assets/images/profile/
    - assets/images/booking/
    - assets/fonts/
  fonts:
    - family: Jost
      fonts:
        - asset: assets/fonts/Jost-Regular.ttf
          weight: 400
        - asset: assets/fonts/Jost-Medium.ttf
          weight: 500
        - asset: assets/fonts/Jost-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Jost-Bold.ttf
          weight: 700

flutter_launcher_icons:
  remove_alpha_ios: true
  image_path: 'assets/icon/app_icon.png'
  android: true
  ios: true

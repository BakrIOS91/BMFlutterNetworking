name: bm_flutter_networking
description: "A Flutter networking package providing a type-safe network layer with SSL pinning, token refresh, interceptors, and connectivity monitoring."
version: 0.1.8
homepage: "https://github.com/BakrIOS91/BMFlutterNetworking"

platforms:
  android:
  ios:
  macos:
  windows:
  linux:
  web:

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Networking & Connectivity
  http: ^1.6.0
  http_parser: ^4.1.2
  connectivity_plus: ^7.1.1

  # Security & Cryptography
  pointycastle: ^4.0.0
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
